<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareBite - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            green: '#136034',  /* Warna teks judul utama */
                            teal: '#1ca386',   /* Warna background tombol user */
                            tealHover: '#168a70'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fafafa] min-h-screen flex flex-col items-center justify-center p-4 antialiased">

    <!-- Card Container -->
    <div class="bg-white border border-gray-200/80 rounded-[20px] px-8 py-10 w-full max-w-[420px] flex flex-col items-center text-center shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)]">
        
        <!-- Logo -->
        <div class="mb-5 flex justify-center">
            <img src="logo.png" alt="ShareBite Logo" class="h-[68px] w-auto object-contain">
        </div>
        
        <!-- Header Texts -->
        <h1 class="text-[26px] font-bold text-brand-green mb-1.5 tracking-tight">ShareBite</h1>
        <p class="text-[13px] text-gray-500 mb-0.5">Selamatkan makanan, bagikan harapan.</p>
        <p class="text-[11px] text-gray-400 mb-8">Platform redistribusi makanan surplus real-time.</p>
        
        <!-- Action Buttons -->
        <div class="w-full flex flex-col gap-3.5">
            <!-- User Login Button -->
            <button class="w-full bg-brand-teal hover:bg-brand-tealHover text-white rounded-xl py-3 px-4 flex items-center justify-center gap-3 transition-colors duration-200">
                <i data-lucide="circle-user" class="w-[20px] h-[20px] opacity-90"></i>
                <span class="font-medium text-sm">Log in as user</span>
            </button>

            <!-- Donor Login Button -->
            <button class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-xl py-3 px-4 flex items-center justify-center gap-3 transition-colors duration-200 shadow-sm">
                <i data-lucide="store" class="w-[20px] h-[20px] text-gray-600"></i>
                <span class="font-medium text-sm">Log in as a donor</span>
            </button>
        </div>
        
    </div>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
